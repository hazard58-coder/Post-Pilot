name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── 1. TEST ───────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --coverage --passWithNoTests
        env:
          CI: true

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL:      https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJplaceholder
          VITE_DEMO_ENABLED:      "true"

  # ── 2. MIGRATE ────────────────────────────────────────────────
  # Runs database migrations automatically on every push to main.
  # Requires two GitHub Secrets (set once in repo Settings → Secrets):
  #   SUPABASE_ACCESS_TOKEN  — from supabase.com → Account → Access Tokens
  #   SUPABASE_PROJECT_REF   — the project ID in your Supabase project URL
  #   SUPABASE_DB_PASSWORD   — the database password you set when creating the project
  migrate:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check migration secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "⚠️  SUPABASE_ACCESS_TOKEN secret not set — skipping migrations"
            echo "Add it in GitHub → Settings → Secrets and variables → Actions"
            exit 0
          fi

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v1.200.3/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase

      - name: Run migrations
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --password     "${{ secrets.SUPABASE_DB_PASSWORD }}"

  # ── 3. DEPLOY ─────────────────────────────────────────────────
  # Vercel deploys automatically from GitHub — no secrets needed here.
  # If you want GitHub Actions to also trigger deploys, add:
  #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_PRODUCTION
  # to GitHub Secrets and uncomment the steps below.
  deploy:
    needs: [test, migrate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Vercel (GitHub integration)
        run: |
          echo "✅ Vercel deploys automatically when this commit reaches GitHub."
          echo "   No extra steps needed — Vercel watches the main branch."
          echo ""
          echo "   To also trigger deploys from CI, add VERCEL_TOKEN to GitHub Secrets."

      # ── Optional: uncomment to deploy via GitHub Actions instead ──
      # - uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}
      #     vercel-args: '--prod=true'

  # ── 4. SECURITY ───────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level high
        continue-on-error: true
